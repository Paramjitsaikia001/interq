name: Production CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secure_pass
          POSTGRES_DB: interq_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres to be ready
        env:
          PGPASSWORD: postgres_secure_pass
        run: |
          for i in {1..60}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break
            sleep 2
          done
          pg_isready -h 127.0.0.1 -p 5432 -U postgres || (echo "Postgres not ready" && exit 1)

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres_secure_pass@localhost:5432/interq_test

      - name: Verify Prisma Migration Setup
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres_secure_pass@localhost:5432/interq_test

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: postgresql://postgres:postgres_secure_pass@localhost:5432/interq_test
          REDIS_URL: redis://localhost:6379
          FIREBASE_PROJECT_ID: interq-test-id
          FIREBASE_CLIENT_EMAIL: firebase-adminsdk-fbsvc@interq-test-id.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQDIK6b8xn3KOlTI\n-----END PRIVATE KEY-----\n"
