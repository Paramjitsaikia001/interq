name: Production CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # make DB/redis URLs available to every step
    env:
      DATABASE_URL: postgresql://postgres:postgres_secure_pass@127.0.0.1:5432/interq_test
      REDIS_URL: redis://127.0.0.1:6379

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secure_pass
          POSTGRES_DB: interq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost -p 5432"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres to be ready
        run: |
          set -euo pipefail
          echo "Waiting for Postgres on 127.0.0.1:5432..."
          for i in {1..60}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres; then
              echo "Postgres ready"
              break
            fi
            echo "Postgres not ready yet, attempt $i/60"
            sleep 2
          done

          if ! pg_isready -h 127.0.0.1 -p 5432 -U postgres; then
            echo "Postgres not ready after retries — docker ps / logs:"
            docker ps --format "table {{.Image}}\t{{.Names}}\t{{.Status}}"
            CONTAINER=$(docker ps -q --filter ancestor=postgres:16 | head -n1) || true
            if [ -n "$CONTAINER" ]; then
              echo "---- Postgres logs ----"
              docker logs "$CONTAINER" || true
              echo "---- End Postgres logs ----"
            fi
            exit 1
          fi

      - name: Debug DB connection (quick check)
        run: |
          echo "pg_isready output:"
          pg_isready -h 127.0.0.1 -p 5432 -U postgres || true
          echo "Attempting psql connection (list databases):"
          PGPASSWORD=postgres_secure_pass psql -h 127.0.0.1 -U postgres -c '\l' || true

      - name: Generate Prisma Client
        run: npx prisma generate
        # DATABASE_URL is provided at job-level (see env above)

      - name: Verify Prisma Migration Setup
        run: npx prisma db push --skip-generate
        # DATABASE_URL provided at job-level

      # If you have another step or npm script that runs prisma db push --accept-data-loss,
      # ensure it runs with DATABASE_URL in the environment. With the job-level env above
      # this will be available. If the command still fails, add --schema path and debugging:
      - name: Apply Prisma schema (explicit, will show errors)
        run: |
          set -euo pipefail
          echo "Final DB connectivity check before prisma db push..."
          PGPASSWORD=postgres_secure_pass psql -h 127.0.0.1 -U postgres -c '\l'
          echo "Running prisma db push (will print errors if any)..."
          # enable Prisma debug logging for more details if it fails
          PRISMA_LOG_LEVEL=debug npx prisma db push --accept-data-loss --schema=./prisma/schema.prisma
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run Linter
        run: npm run lint
        continue-on-error: true

      - name: Build Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          FIREBASE_PROJECT_ID: interq-test-id
          FIREBASE_CLIENT_EMAIL: firebase-adminsdk-fbsvc@interq-test-id.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQDIK6b8xn3KOlTI\n-----END PRIVATE KEY-----\n"
