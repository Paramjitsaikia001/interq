name: Production CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # make DB/redis URLs available to every step
    env:
      DATABASE_URL: postgresql://postgres:postgres_secure_pass@127.0.0.1:5432/interq_test
      REDIS_URL: redis://127.0.0.1:6379

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secure_pass
          POSTGRES_DB: interq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -h 127.0.0.1 -p 5432"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres to be ready
        run: |
          set -euo pipefail
          echo "Waiting for Postgres on 127.0.0.1:5432..."
          for i in {1..60}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && { echo "Postgres ready"; break; }
            echo "Postgres not ready yet, attempt $i/60"
            sleep 2
          done
          pg_isready -h 127.0.0.1 -p 5432 -U postgres || (echo "Postgres not ready after retries" && docker ps --format "table {{.Image}}\t{{.Names}}\t{{.Status}}" && docker logs $(docker ps -q --filter ancestor=postgres:16) || true && exit 1)

      - name: Debug DB connection (quick check)
        run: |
          echo "pg_isready output:"
          pg_isready -h 127.0.0.1 -p 5432 -U postgres || true
          echo "Attempting psql connection (list databases):"
          PGPASSWORD=postgres_secure_pass psql -h 127.0.0.1 -U postgres -c '\l' || true

      - name: Generate Prisma Client
        run: npx prisma generate
        # DATABASE_URL is provided at job-level (see env above)

      - name: Verify Prisma Migration Setup
        run: npx prisma db push --skip-generate
        # DATABASE_URL provided at job-level

      # If you have another step or npm script that runs prisma db push --accept-data-loss,
      # ensure it runs with DATABASE_URL in the environment. With the job-level env above
      # this will be available. If the command still fails, add --schema path and debugging:
      - name: Apply Prisma schema (explicit, will show errors)
        run: |
          npx prisma db push --accept-data-loss --schema=./prisma/schema.prisma
        continue-on-error: false

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          FIREBASE_PROJECT_ID: interq-test-id
          FIREBASE_CLIENT_EMAIL: firebase-adminsdk-fbsvc@interq-test-id.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQDIK6b8xn3KOlTI\n-----END PRIVATE KEY-----\n"
